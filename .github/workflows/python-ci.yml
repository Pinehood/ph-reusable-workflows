name: Continuous Integration - Python

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner used for the install/build/verify job"
        required: false
        type: string
        default: "ubuntu-latest"
      docker_runner:
        description: "Runner used for the Docker job"
        required: false
        type: string
        default: "ubuntu-latest"
      working_directory:
        description: "Directory where Python commands should run"
        required: false
        type: string
        default: "."
      python_version:
        description: "Python version"
        required: false
        type: string
        default: "3.12"
      python_cache:
        description: "Dependency cache type for setup-python"
        required: false
        type: string
        default: "pip"
      cache_dependency_path:
        description: "Optional dependency lockfile path used for cache scoping"
        required: false
        type: string
        default: ""
      install_cmd:
        description: "Install command"
        required: false
        type: string
        default: "make install"
      build_cmd:
        description: "Build command"
        required: false
        type: string
        default: "make build"
      run_check:
        description: "Run code quality/verification stage"
        required: false
        type: boolean
        default: false
      check_cmd:
        description: "Check command"
        required: false
        type: string
        default: "make check"
      run_lint:
        description: "Run lint stage"
        required: false
        type: boolean
        default: false
      lint_cmd:
        description: "Lint command"
        required: false
        type: string
        default: "ruff check ."
      run_test:
        description: "Run test stage"
        required: false
        type: boolean
        default: false
      test_cmd:
        description: "Test command"
        required: false
        type: string
        default: "pytest"
      run_additional:
        description: "Run an additional project-specific stage"
        required: false
        type: boolean
        default: false
      additional_cmd:
        description: "Additional command"
        required: false
        type: string
        default: ""
      docker_enabled:
        description: "Build Docker image"
        required: false
        type: boolean
        default: true
      build_on_pull_request:
        description: "Also build Docker image on pull requests"
        required: false
        type: boolean
        default: false
      docker_context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Dockerfile path relative to repository root"
        required: false
        type: string
        default: "Dockerfile"
      image_name:
        description: "Docker image name used for generated tags"
        required: false
        type: string
        default: ""
      ecr_repository:
        description: "ECR repository name; defaults to image_name"
        required: false
        type: string
        default: ""
      image_tag_prefix:
        description: "Tag prefix used before the branch name"
        required: false
        type: string
        default: "latest"
      package_cmd:
        description: "Optional packaging command to run before Docker build"
        required: false
        type: string
        default: ""
      docker_build_args:
        description: "Additional docker buildx arguments"
        required: false
        type: string
        default: ""
      docker_platforms:
        description: "Target Docker platforms"
        required: false
        type: string
        default: "linux/arm64"
      docker_cache_from:
        description: "Docker cache-from value"
        required: false
        type: string
        default: "type=gha"
      docker_cache_to:
        description: "Docker cache-to value"
        required: false
        type: string
        default: "type=gha,mode=max"
      bw_cloud_region:
        description: "Bitwarden cloud region"
        required: false
        type: string
        default: "eu"
      bw_aws_access_key_id_secret_id:
        description: "Bitwarden secret ID for AWS access key ID"
        required: false
        type: string
        default: "e7c6fc64-87b1-45dd-9420-b41400a2e518"
      bw_aws_secret_access_key_secret_id:
        description: "Bitwarden secret ID for AWS secret access key"
        required: false
        type: string
        default: "e2765187-2097-4382-bbc3-b41400a2f529"
      bw_aws_region_secret_id:
        description: "Bitwarden secret ID for AWS region"
        required: false
        type: string
        default: "238f1f37-baac-4158-b673-b41400a30d2f"
      bw_aws_ecr_registry_secret_id:
        description: "Bitwarden secret ID for AWS ECR registry"
        required: false
        type: string
        default: "d49acdfd-f59d-4260-ba03-b41400a2d594"
      bw_docker_build_arg_secrets:
        description: "Optional Bitwarden secret ID to Docker build arg name mappings, one per line: <secret-id> > <BUILD_ARG_NAME>"
        required: false
        type: string
        default: ""

jobs:
  integrate:
    name: Install, Build & Verify
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        timeout-minutes: 1
        uses: actions/checkout@v6

      - name: Setup Python
        timeout-minutes: 1
        if: ${{ inputs.cache_dependency_path == '' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: ${{ inputs.python_cache }}

      - name: Setup Cached Python
        timeout-minutes: 1
        if: ${{ inputs.cache_dependency_path != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: ${{ inputs.python_cache }}
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Install
        timeout-minutes: 5
        if: ${{ inputs.install_cmd != '' }}
        run: ${{ inputs.install_cmd }}

      - name: Build
        timeout-minutes: 5
        if: ${{ inputs.build_cmd != '' }}
        run: ${{ inputs.build_cmd }}

      - name: Check
        timeout-minutes: 5
        if: ${{ inputs.run_check && inputs.check_cmd != '' }}
        run: ${{ inputs.check_cmd }}

      - name: Lint
        timeout-minutes: 5
        if: ${{ inputs.run_lint && inputs.lint_cmd != '' }}
        run: ${{ inputs.lint_cmd }}

      - name: Test
        timeout-minutes: 5
        if: ${{ inputs.run_test && inputs.test_cmd != '' }}
        run: ${{ inputs.test_cmd }}

      - name: Additional
        timeout-minutes: 5
        if: ${{ inputs.run_additional && inputs.additional_cmd != '' }}
        run: ${{ inputs.additional_cmd }}

  docker:
    name: Build Docker Image
    needs: integrate
    runs-on: ${{ inputs.docker_runner }}
    if: ${{ inputs.docker_enabled && (github.event_name != 'pull_request' || inputs.build_on_pull_request) }}
    steps:
      - name: Checkout
        timeout-minutes: 1
        uses: actions/checkout@v6

      - name: Setup Python
        timeout-minutes: 1
        if: ${{ inputs.package_cmd != '' && inputs.cache_dependency_path == '' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: ${{ inputs.python_cache }}

      - name: Setup Cached Python
        timeout-minutes: 1
        if: ${{ inputs.package_cmd != '' && inputs.cache_dependency_path != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: ${{ inputs.python_cache }}
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Package
        timeout-minutes: 5
        if: ${{ inputs.package_cmd != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.package_cmd }}

      - name: Setup QEMU
        timeout-minutes: 1
        if: ${{ !contains(inputs.docker_runner, '-arm') }}
        uses: docker/setup-qemu-action@v4

      - name: Setup Buildx
        timeout-minutes: 1
        uses: docker/setup-buildx-action@v4

      - name: Load Secrets
        timeout-minutes: 1
        id: bitwarden
        uses: bitwarden/sm-action@v2.2.0
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          cloud_region: ${{ inputs.bw_cloud_region }}
          secrets: |
            ${{ inputs.bw_aws_access_key_id_secret_id }} > AWS_ACCESS_KEY_ID
            ${{ inputs.bw_aws_secret_access_key_secret_id }} > AWS_SECRET_ACCESS_KEY
            ${{ inputs.bw_aws_region_secret_id }} > AWS_REGION
            ${{ inputs.bw_aws_ecr_registry_secret_id }} > AWS_ECR_REGISTRY
            ${{ inputs.bw_docker_build_arg_secrets }}

      - name: Resolve Docker Metadata
        timeout-minutes: 1
        id: meta
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          image_name="${{ inputs.image_name }}"
          ecr_repository="${{ inputs.ecr_repository }}"
          ecr_registry="${{ steps.bitwarden.outputs.AWS_ECR_REGISTRY }}"
          aws_region="${{ steps.bitwarden.outputs.AWS_REGION }}"

          if [ -z "$image_name" ]; then
            image_name="$repo_name"
          fi

          if [ -z "$ecr_repository" ]; then
            ecr_repository="$image_name"
          fi

          {
            echo "image_name=$image_name"
            echo "ecr_repository=$ecr_repository"
            echo "ecr_registry=$ecr_registry"
            echo "aws_region=$aws_region"
          } >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        timeout-minutes: 1
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ steps.bitwarden.outputs.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ steps.bitwarden.outputs.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.meta.outputs.aws_region }}

      - name: Login to AWS ECR
        timeout-minutes: 1
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: "true"

      - name: Resolve Docker Build Args
        timeout-minutes: 1
        id: build_args
        uses: Pinehood/ph-reusable-workflows/.github/actions/resolve-docker-build-args@main
        with:
          docker_build_args: ${{ inputs.docker_build_args }}
          bw_docker_build_arg_secrets: ${{ inputs.bw_docker_build_arg_secrets }}
          bw_outputs_json: ${{ toJson(steps.bitwarden.outputs) }}

      - name: Build & Push Docker Image
        timeout-minutes: 10
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.docker_platforms }}
          push: true
          tags: ${{ steps.meta.outputs.ecr_registry }}/${{ steps.meta.outputs.ecr_repository }}:${{ inputs.image_tag_prefix }}-${{ github.ref_name }}
          build-args: ${{ steps.build_args.outputs.build_args }}
          cache-from: ${{ inputs.docker_cache_from }}
          cache-to: ${{ inputs.docker_cache_to }}
