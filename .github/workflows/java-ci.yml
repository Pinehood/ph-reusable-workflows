name: Continuous Integration - Java

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner used for the build/verify job"
        required: false
        type: string
        default: "ubuntu-latest"
      docker_runner:
        description: "Runner used for the Docker job"
        required: false
        type: string
        default: "ubuntu-24.04-arm"
      working_directory:
        description: "Directory where Java commands should run"
        required: false
        type: string
        default: "."
      java_version:
        description: "Java version"
        required: false
        type: string
        default: "21"
      java_distribution:
        description: "Java distribution"
        required: false
        type: string
        default: "temurin"
      java_cache:
        description: "Dependency cache type for setup-java"
        required: false
        type: string
        default: "maven"
      build_cmd:
        description: "Build command"
        required: false
        type: string
        default: "mvn -B -q compile"
      run_verify:
        description: "Run code quality/verification stage"
        required: false
        type: boolean
        default: false
      verify_cmd:
        description: "Verification command"
        required: false
        type: string
        default: "mvn -B -q verify -DskipTests"
      run_test:
        description: "Run test stage"
        required: false
        type: boolean
        default: true
      test_cmd:
        description: "Test command"
        required: false
        type: string
        default: "mvn -B test"
      run_additional:
        description: "Run an additional project-specific stage"
        required: false
        type: boolean
        default: false
      additional_cmd:
        description: "Additional command"
        required: false
        type: string
        default: ""
      docker_enabled:
        description: "Build Docker image"
        required: false
        type: boolean
        default: true
      build_on_pull_request:
        description: "Also build Docker image on pull requests"
        required: false
        type: boolean
        default: false
      docker_context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Dockerfile path relative to repository root"
        required: false
        type: string
        default: "Dockerfile"
      image_name:
        description: "Docker image name used for generated tags"
        required: false
        type: string
        default: ""
      ecr_repository:
        description: "ECR repository name; defaults to image_name"
        required: false
        type: string
        default: ""
      image_tag_prefix:
        description: "Tag prefix used before the branch name"
        required: false
        type: string
        default: "latest"
      package_cmd:
        description: "Optional packaging command to run before Docker build"
        required: false
        type: string
        default: ""
      docker_build_args:
        description: "Additional docker buildx arguments"
        required: false
        type: string
        default: ""
      docker_platforms:
        description: "Target Docker platforms"
        required: false
        type: string
        default: "linux/arm64"
      docker_cache_from:
        description: "Docker cache-from value"
        required: false
        type: string
        default: "type=gha"
      docker_cache_to:
        description: "Docker cache-to value"
        required: false
        type: string
        default: "type=gha,mode=max"
      bw_cloud_region:
        description: "Bitwarden cloud region"
        required: false
        type: string
        default: "eu"
      bw_aws_access_key_id_secret_id:
        description: "Bitwarden secret ID for AWS access key ID"
        required: false
        type: string
        default: "e7c6fc64-87b1-45dd-9420-b41400a2e518"
      bw_aws_secret_access_key_secret_id:
        description: "Bitwarden secret ID for AWS secret access key"
        required: false
        type: string
        default: "e2765187-2097-4382-bbc3-b41400a2f529"
      bw_aws_region_secret_id:
        description: "Bitwarden secret ID for AWS region"
        required: false
        type: string
        default: "238f1f37-baac-4158-b673-b41400a30d2f"
      bw_aws_ecr_registry_secret_id:
        description: "Bitwarden secret ID for AWS ECR registry"
        required: false
        type: string
        default: "d49acdfd-f59d-4260-ba03-b41400a2d594"

jobs:
  integrate:
    name: Build and Verify
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ inputs.java_distribution }}
          java-version: ${{ inputs.java_version }}
          cache: ${{ inputs.java_cache }}

      - name: Build
        run: ${{ inputs.build_cmd }}

      - name: Verify
        if: ${{ inputs.run_verify && inputs.verify_cmd != '' }}
        run: ${{ inputs.verify_cmd }}

      - name: Test
        if: ${{ inputs.run_test && inputs.test_cmd != '' }}
        run: ${{ inputs.test_cmd }}

      - name: Additional
        if: ${{ inputs.run_additional && inputs.additional_cmd != '' }}
        run: ${{ inputs.additional_cmd }}

  docker:
    name: Build Docker Image
    needs: integrate
    runs-on: ${{ inputs.docker_runner }}
    if: ${{ inputs.docker_enabled && (github.event_name != 'pull_request' || inputs.build_on_pull_request) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        if: ${{ inputs.package_cmd != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java_distribution }}
          java-version: ${{ inputs.java_version }}
          cache: ${{ inputs.java_cache }}

      - name: Package
        if: ${{ inputs.package_cmd != '' }}
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.package_cmd }}

      - name: Setup QEMU
        if: ${{ !contains(inputs.docker_runner, '-arm') }}
        uses: docker/setup-qemu-action@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Load secrets from Bitwarden
        id: bitwarden
        uses: bitwarden/sm-action@v3.0.0-beta.4
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          cloud_region: ${{ inputs.bw_cloud_region }}
          secrets: |
            ${{ inputs.bw_aws_access_key_id_secret_id }} > AWS_ACCESS_KEY_ID
            ${{ inputs.bw_aws_secret_access_key_secret_id }} > AWS_SECRET_ACCESS_KEY
            ${{ inputs.bw_aws_region_secret_id }} > AWS_REGION
            ${{ inputs.bw_aws_ecr_registry_secret_id }} > AWS_ECR_REGISTRY

      - name: Resolve Docker Metadata
        id: meta
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          image_name="${{ inputs.image_name }}"
          ecr_repository="${{ inputs.ecr_repository }}"
          ecr_registry="${{ steps.bitwarden.outputs.AWS_ECR_REGISTRY }}"
          aws_region="${{ steps.bitwarden.outputs.AWS_REGION }}"

          if [ -z "$image_name" ]; then
            image_name="$repo_name"
          fi

          if [ -z "$ecr_repository" ]; then
            ecr_repository="$image_name"
          fi

          {
            echo "image_name=$image_name"
            echo "ecr_repository=$ecr_repository"
            echo "ecr_registry=$ecr_registry"
            echo "aws_region=$aws_region"
          } >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ steps.bitwarden.outputs.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ steps.bitwarden.outputs.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.meta.outputs.aws_region }}

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: "true"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.docker_platforms }}
          push: true
          tags: ${{ steps.meta.outputs.ecr_registry }}/${{ steps.meta.outputs.ecr_repository }}:${{ inputs.image_tag_prefix }}-${{ github.ref_name }}
          build-args: ${{ inputs.docker_build_args }}
          cache-from: ${{ inputs.docker_cache_from }}
          cache-to: ${{ inputs.docker_cache_to }}
